rsac_admin.dashboard:
  path: '/admin/content/rsac'
  defaults:
    _controller: '\Drupal\rsac_admin\Controller\ContentDashboardController::dashboard'
    _title: 'RSAC Collections'
  requirements:
    _permission: 'administer nodes'

rsac_admin.collection:
  path: '/admin/content/rsac/{collection}'
  defaults:
    _controller: '\Drupal\rsac_admin\Controller\ContentDashboardController::collection'
    _title_callback: '\Drupal\rsac_admin\Controller\ContentDashboardController::collectionTitle'
  requirements:
    _permission: 'administer nodes'
    collection: '[a-z_]+'
